api_version = "2025-01"

[[extensions]]
name = "Kefey line images"
handle = "kefey-line-images"
uid = "b2c3d4e5-f6a7-8901-bcde-f12345678901"
type = "function"
description = "Shows pack-specific product images in checkout from line item properties."

  [[extensions.targeting]]
  target = "purchase.cart-transform.run"
  input_query = "src/run.graphql"
  export = "run"

  [extensions.build]
  command = "npm exec -- shopify app function build"
  path = "dist/function.wasm"
  watch = ["src/**/*.js"]
