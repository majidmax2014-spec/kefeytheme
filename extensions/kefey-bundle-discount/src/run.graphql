query RunInput {
  cart {
    lines {
      id
      quantity
      bundleDiscount: attribute(key: "_kefey_bundle_discount") {
        value
      }
      upsellDiscount: attribute(key: "_kefey_upsell_discount") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
    }
  }
}
